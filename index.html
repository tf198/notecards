<!DOCTYPE html>
<html data-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NoteCards</title>
    <link rel="icon" type="image/svg+xml" href="static/quavers.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/quavers-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/quavers-16.png" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#f5f5f5" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css" />
    <link rel="stylesheet" href="static/notecards.css" />
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="js/abcjs-basic-min.js"></script>
    <script src="js/instruments.js"></script>
    <script src="js/notecards.js"></script>
    <script>
      const registerServiceWorker = async () => {
        if ("serviceWorker" in navigator) {
          try {
            const registration = await navigator.serviceWorker.register("sw.js", {
              scope: ".",
            });
            if (registration.installing) {
              console.log("Service worker installing");
            } else if (registration.waiting) {
              console.log("Service worker installed");
            } else if (registration.active) {
              console.log("Service worker active");
            }
          } catch (error) {
            console.error(`Registration failed with ${error}`);
          }
        }
      };

      // …

      registerServiceWorker();
    </script>
  </head>
  <body x-data="App()">
    <nav class="navbar is-light" role="navigation" aria-label="main navigation" x-data>
      <div class="navbar-brand">
        <a class="navbar-item" @click="changeState('select')">
          <img src="static/quavers.svg" />
          NoteCards
        </a>
        <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="navSettings" id="navBurgers">
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
        </a>
      </div>
      <div id="navSettings" class="navbar-menu">
        <a class="navbar-item" @click="changeState('select')"><span x-text="settings.instrumentName + ' Games'"></span></a>
        <a class="navbar-item" @click="changeState('settings')">Settings</a>
      </div>
    </nav>
    <section class="section">
      <div class="container is-max-tablet" x-data="Game()">

        <!-- GAME PANE -->
        <div id="play-panel" x-cloak x-show="$store.state === 'playing'">
          <h2 class="title has-text-centered"><span x-text="gameName"></span></h2>
          <div class="columns is-centered is-vcentered">
            <div class="column is-narrow" x-effect="ABCJS.renderAbc('note', '%%scale 2\nK:' + instrument.clef + '\n' + note + '2');">
              <div class="box mx-auto" style="width: 250px">
                <div id="note" style="max-width: 200px; min-height: 220px; margin: auto;"></div>
              </div>
            </div>
            <div class="column is-narrow">
              <div class="mx-auto answers" style="max-width: 500px; max-height: 350px;">
                <template x-for="buttonGroup in buttonGroups">
                  <div class="button-group" :class="quiz.reverse && 'button-group-reversed'">
                    <template x-for="button in buttonGroup">
                      <button class="button answer is-size-5" 
                        x-bind:disabled="locked"
                        x-on:click="check(button[1])" x-text="button[0]" style="margin: 10px;"></button>
                    </template>
                  </div>
                </template>
              </div>
            </div>
          </div>
          <div class="container">
            <div class="box" :class="message && 'has-background-warning-light'">
              <div class="is-family-monospace">
                <div class="has-text-weight-bold" x-text="message"></div>
                <div class="has-text-right" x-show="!message">
                  Time: <span x-text="remaining"></span>s
                  Cards: <span x-text="correct"></span>
                  Score: <span x-text="score"></span>
                </div>
              </div>
              <div x-show="remaining"><progress :value="remaining"  :max="gameLength" style="width: 100%"></progress></div>
            </div>
          </div>
        </div>

        <!-- RESULTS PANE -->
        <div id="result-pane" x-cloak x-show="$store.state === 'results'">
          <h2 class="title has-text-centered"><span x-text="gameName"></span></h2>
          <div class="notification is-success has-text-centered has-text-weight-bold">
            <h1 class="is-size-1">Score <span x-text=score></span></h1>
            <h3 class="is-size-5" x-text="stats.message"></h3>
          </div>
          <table class="table mx-auto">
            <tbody>
              <tr><th>Cards</th><td x-text="correct"></td></tr>
              <tr><th>Errors</th><td x-text="incorrect"></td></tr>
              <tr><th>Seconds per Card</th><td><span x-text="stats.secondsPerCard"</td></tr>
              <tr x-show="correct + incorrect"><th>Accuracy</th><td><span x-text="Math.ceil(correct * 100 / (correct+incorrect))"></span>%</td></tr>
            </tbody>
          </table>
          <div class="has-text-centered" x-show="locked === false" x-transition>
            <a class="button is-success" x-on:click="startGame()">Play again...</a>
          </div>
        </div>

        <!-- GAME SELECTION PANE -->
        <div id="choose-pane" x-show="$store.state === 'select'">
          <h2 class="title has-text-centered"><span x-text="settings.instrumentName"></span> Games</h2>
          <table class="table mx-auto is-hoverable is-size-5">
            <thead>
              <tr>
                <th>Game</th>
                <th>Highscore</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="(game, name) in instrument.games">
                <tr>
                  <td><a x-text="name" x-on:click="loadGame(instrument, name, settings.gameLength); startGame()"></a></td>
                  <td class="has-text-centered" x-text="highscore(name)"></td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>

        <!-- SETTINGS PANE -->
        <div id="settings-pane" x-cloak x-show="$store.state === 'settings'">
          <h2 class="title">Settings</h2>
          <div class="box">
            <div class="field is-horizontal">
              <div class="field-label">
                <label class="label">Instrument</label>
              </div>
              <div class="field-body">
                <div class="field">
                  <div class="control is-expanded">
                    <div class="select is-fullwidth">
                      <select x-model:value="settings.instrumentName">
                        <option>Violin</option>
                        <option>Viola</option>
                        <option>Cello</option>
                      </select>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div class="field is-horizontal">
              <div class="field-label">
                <label class="label">Length</label>
              </div>
              <div class="field-body">
                <div class="field">
                  <div class="control is-expanded">
                    <div class="select is-fullwidth">
                      <select x-model:value="settings.gameLength" type="number">
                        <option value="10">Quick test</option>
                        <option value="30">30 Seconds Speed Round</option>
                        <option value="60">1 Minute Challenge</option>
                        <option value="300">5 Minute Practice</option>
                      </select>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div class="field is-horizontal">
              <div class="field-label"></div>
              <div class="field-body">
                <div class="field">
                  <div class="control">
                    <button class="button is-primary" @click="saveSettings(); changeState('select')">Save</button>
                    <button class="button" @click="localStorage.removeItem('highscores'); window.location=''">Clear Scores</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
