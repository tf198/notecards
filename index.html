<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>NoteCards</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.3/css/bulma.min.css" />
        <link rel="stylesheet" href="notecards.css" />
        <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
        <script src="js/abcjs-basic-min.js"></script>
        <script src="js/notecards.js"></script>
    </head>
    <body>
        <nav class="navbar is-light" x-data>
            <div class="navbar-brand">
                <a class="navbar-item subtitle" x-on:click="$store.state = 'select'">NoteCards</a>
            </div>
            <div class="navbar-menu">
                <div class="navbar-item">
                    <a class="navbar-item" x-on:click="$store.state = 'select'">Games</a>
                </div>
            </div>
        </nav>
        <section class="section has-text-centered" x-data="Game()">
            <div id="play-panel" x-cloak x-show="$store.state === 'playing'">
                <h2 x-text="gameName" class="title"></h2>
                <div class="columns is-centered is-vcentered">
                    <div class="column is-narrow" x-effect="ABCJS.renderAbc('note', '%%scale 2\n' + note + '2');">
                        <div class="box mx-auto" style="width: 250px">
                            <div id="note" style="max-width: 200px; min-height: 300px; margin: auto;"></div>
                        </div>
                    </div>
                    <div class="column is-narrow">
                        <div class="mx-auto answers" style="max-width: 475px; max-height: 350px;">
                        <template x-for="button in buttons">
                            <button class="button is-large answer" 
                                x-bind:disabled="locked"
                                x-on:click="check(button[1])" x-text="button[0]" style="margin: 10px;"></button>
                        </template>
                        </div>
                    </div>
                </div>
                <div class="column is-narrow">
                    <div class="box">
                        <div class="has-text-right is-family-monospace">Time: <span x-text="remaining"></span>s Cards: <span x-text="correct"></span> <span x-show="incorrect">[-<span x-text="incorrect"></span>]</span></div>
                        <div x-show="remaining"><progress :value="remaining"  max="30" style="width: 100%"></progress></div>
                    </div>
                    <div class="notification is-warning" x-text="message" x-show="message"></div>
                </div>
            </div>
            <div id="result-pane" x-cloak x-show="$store.state === 'results'">
                <h2 x-text="gameName" class="title"></h2>
                <h3 class="subtitle">Well done!  You scored <span x-text="score"></span></h3>
                <table class="table mx-auto">
                    <thead>
                        <tr><th colspan="2">Scorecard</th></tr>
                    </thead>
                    <tbody>
                        <tr><th>Cards</th><td x-text="correct"></td></tr>
                        <tr><th>Errors</th><td x-text="incorrect"></td></tr>
                        <tr x-show="correct + incorrect"><th>Accuracy</th><td><span x-text="Math.ceil(correct * 100 / (correct+incorrect))"></span>%</td></tr>
                    </tbody>
                </table>
                <h3><a x-on:click="start(gameName)">Play again...</a></h3>
            </div>
            <div id="choose-pane" x-show="$store.state === 'select'">
                <h2 class="title">Games</h2>
                <table class="table mx-auto is-hoverable">
                    <thead>
                        <tr>
                            <th>Game</th>
                            <th>Highscore</th>
                        </tr>
                    </thead>
                    <tbody>
                    <template x-for="(game, name) in games">
                        <tr><td><a x-text="name" x-on:click="start(name)"></a></td><td x-text="highscore(name)"></td></tr>
                    </template>
                    </tbody>
                </table>
            </div>
        </section>
    </body>
</html>
